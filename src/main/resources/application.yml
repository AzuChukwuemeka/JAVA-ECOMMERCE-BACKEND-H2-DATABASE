server:
  port: 8080

spring:
  application:
    name: ecommerce-backend

  datasource:
    url: jdbc:h2:file:./data/ecommercedb;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jackson:
    default-property-inclusion: non_null

app:
  jwt:
    # Base64-encoded secret key used to sign JWT tokens. Override via env var JWT_SECRET in production.
    secret: ${JWT_SECRET:MzY0OTI0NmM1YzdmNGY0YzYxNjM2MTZkNjU2ZTc0NmY2NjZhNzc3NDZmNmI2NTZlNzM2OTY3NmU2OTZlNjcyMTIxMjE=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000} # 24 hours
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  # Single source of truth for "what is my public URL" — drives the Swagger
  # "server" dropdown so Try it out calls hit Render, not localhost.
  # Locally defaults to localhost:8080. On Render, set APP_BASE_URL to your
  # service URL, e.g. https://ecommerce-backend.onrender.com
  base-url: ${APP_BASE_URL:http://localhost:8080}
  # When true, Swagger publishes the seeded demo admin/user credentials in its
  # description. Set DEMO_MODE=false in Render if this stops being a public demo.
  demo-mode: ${DEMO_MODE:true}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
